<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="640" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">nano-banana-images — Architecture</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#8b8fa8">AI Image Generation Toolkit · Reference-preserving · Multi-backend</text>

  <!-- ─── COLUMN HEADERS ─── -->
  <!-- Col 1: User -->
  <text x="90" y="100" text-anchor="middle" font-size="11" fill="#6b7280" letter-spacing="1">INPUT</text>
  <!-- Col 2: Script -->
  <text x="310" y="100" text-anchor="middle" font-size="11" fill="#6b7280" letter-spacing="1">SCRIPT</text>
  <!-- Col 3: Backend -->
  <text x="580" y="100" text-anchor="middle" font-size="11" fill="#6b7280" letter-spacing="1">BACKEND</text>
  <!-- Col 4: Output -->
  <text x="800" y="100" text-anchor="middle" font-size="11" fill="#6b7280" letter-spacing="1">OUTPUT</text>

  <!-- ─── COLUMN DIVIDERS ─── -->
  <line x1="195" y1="90" x2="195" y2="610" stroke="#1e2030" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="450" y1="90" x2="450" y2="610" stroke="#1e2030" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="700" y1="90" x2="700" y2="610" stroke="#1e2030" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ══════════════════════════════
       INPUT COLUMN
       ══════════════════════════════ -->

  <!-- Prompt JSON box -->
  <rect x="20" y="115" width="150" height="70" rx="8" fill="#1a1f2e" stroke="#4f6ef7" stroke-width="1.5"/>
  <text x="95" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#4f6ef7">📄 Prompt JSON</text>
  <text x="95" y="158" text-anchor="middle" font-size="10" fill="#9ca3af">prompt · neg_prompt</text>
  <text x="95" y="172" text-anchor="middle" font-size="10" fill="#9ca3af">aspect_ratio · resolution</text>

  <!-- Reference Image box -->
  <rect x="20" y="215" width="150" height="60" rx="8" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="95" y="239" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">🖼 Reference Image</text>
  <text x="95" y="257" text-anchor="middle" font-size="10" fill="#9ca3af">optional · local file</text>
  <text x="95" y="270" text-anchor="middle" font-size="10" fill="#9ca3af">for identity preservation</text>

  <!-- ── arrows into script ── -->
  <!-- Prompt → Script -->
  <line x1="170" y1="150" x2="232" y2="165" stroke="#4f6ef7" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- Ref image → Script -->
  <line x1="170" y1="245" x2="232" y2="205" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- ══════════════════════════════
       SCRIPT COLUMN
       ══════════════════════════════ -->

  <!-- generate_kie.py — primary -->
  <rect x="215" y="115" width="185" height="90" rx="8" fill="#1a2a1a" stroke="#22c55e" stroke-width="2"/>
  <text x="307" y="138" text-anchor="middle" font-size="12" font-weight="bold" fill="#22c55e">generate_kie.py</text>
  <text x="307" y="154" text-anchor="middle" font-size="10" fill="#86efac">PRIMARY · Kie.ai API</text>
  <text x="307" y="170" text-anchor="middle" font-size="10" fill="#9ca3af">Upload ref → submit task</text>
  <text x="307" y="184" text-anchor="middle" font-size="10" fill="#9ca3af">poll status → download</text>
  <rect x="215" y="113" width="66" height="16" rx="4" fill="#22c55e"/>
  <text x="248" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#0f1117">RECOMMENDED</text>

  <!-- generate_sdxl.py -->
  <rect x="215" y="230" width="185" height="65" rx="8" fill="#1a1a2a" stroke="#818cf8" stroke-width="1.5"/>
  <text x="307" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#818cf8">generate_sdxl.py</text>
  <text x="307" y="268" text-anchor="middle" font-size="10" fill="#c7d2fe">Free cloud · Puter.ai</text>
  <text x="307" y="282" text-anchor="middle" font-size="10" fill="#9ca3af">No API key required</text>

  <!-- generate_local.py -->
  <rect x="215" y="318" width="185" height="65" rx="8" fill="#1a1a2a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="307" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#a78bfa">generate_local.py</text>
  <text x="307" y="356" text-anchor="middle" font-size="10" fill="#ddd6fe">Local SDXL · diffusers</text>
  <text x="307" y="370" text-anchor="middle" font-size="10" fill="#9ca3af">GPU/CPU · ~5GB model</text>

  <!-- generate_hf.py -->
  <rect x="215" y="406" width="185" height="65" rx="8" fill="#221a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="307" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#f87171">generate_hf.py</text>
  <text x="307" y="444" text-anchor="middle" font-size="10" fill="#fca5a5">Hugging Face Spaces</text>
  <text x="307" y="458" text-anchor="middle" font-size="10" fill="#9ca3af">HF_TOKEN required</text>

  <!-- ── arrows script → backend ── -->
  <line x1="400" y1="160" x2="462" y2="160" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="400" y1="263" x2="462" y2="330" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr-indigo)"/>
  <line x1="400" y1="350" x2="462" y2="395" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-violet)"/>
  <line x1="400" y1="438" x2="462" y2="460" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- ══════════════════════════════
       BACKEND COLUMN
       ══════════════════════════════ -->

  <!-- Kie.ai / nano-banana-2 -->
  <rect x="462" y="115" width="210" height="105" rx="8" fill="#0f2320" stroke="#22c55e" stroke-width="2"/>
  <text x="567" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#22c55e">☁ Kie.ai</text>
  <text x="567" y="158" text-anchor="middle" font-size="11" fill="#86efac">nano-banana-2 model</text>
  <line x1="475" y1="167" x2="660" y2="167" stroke="#1f3d35" stroke-width="1"/>
  <text x="567" y="182" text-anchor="middle" font-size="10" fill="#9ca3af">File upload · Task queue</text>
  <text x="567" y="196" text-anchor="middle" font-size="10" fill="#9ca3af">Async polling · 2K output</text>
  <text x="567" y="210" text-anchor="middle" font-size="10" fill="#6b7280">api.kie.ai/api/v1/jobs/</text>

  <!-- Puter.ai SDXL -->
  <rect x="462" y="305" width="210" height="70" rx="8" fill="#131324" stroke="#818cf8" stroke-width="1.5"/>
  <text x="567" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#818cf8">☁ Puter.ai</text>
  <text x="567" y="345" text-anchor="middle" font-size="11" fill="#c7d2fe">SDXL · Free tier</text>
  <text x="567" y="362" text-anchor="middle" font-size="10" fill="#9ca3af">api.puter.ai/v2/image/generate</text>

  <!-- Local diffusers -->
  <rect x="462" y="393" width="210" height="60" rx="8" fill="#17131f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="567" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#a78bfa">💻 Local GPU/CPU</text>
  <text x="567" y="432" text-anchor="middle" font-size="11" fill="#ddd6fe">SDXL via diffusers + torch</text>
  <text x="567" y="447" text-anchor="middle" font-size="10" fill="#9ca3af">Runs on-device · no API</text>

  <!-- HF -->
  <rect x="462" y="471" width="210" height="55" rx="8" fill="#1f1313" stroke="#f87171" stroke-width="1.5"/>
  <text x="567" y="493" text-anchor="middle" font-size="13" font-weight="bold" fill="#f87171">☁ Hugging Face</text>
  <text x="567" y="510" text-anchor="middle" font-size="11" fill="#fca5a5">Spaces API · SD / Flux</text>
  <text x="567" y="524" text-anchor="middle" font-size="10" fill="#9ca3af">Requires paid billing</text>

  <!-- ── arrows backend → output ── -->
  <line x1="672" y1="167" x2="730" y2="200" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="672" y1="340" x2="730" y2="290" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr-indigo)"/>
  <line x1="672" y1="420" x2="730" y2="330" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-violet)"/>

  <!-- ══════════════════════════════
       OUTPUT COLUMN
       ══════════════════════════════ -->

  <!-- Generated Image -->
  <rect x="730" y="155" width="148" height="200" rx="8" fill="#1a1f2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="804" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">🖼 Generated Image</text>
  <line x1="742" y1="190" x2="866" y2="190" stroke="#2d3148" stroke-width="1"/>
  <!-- mock image preview -->
  <rect x="752" y="198" width="104" height="80" rx="4" fill="#0d1117" stroke="#374151" stroke-width="1"/>
  <text x="804" y="240" text-anchor="middle" font-size="28" fill="#374151">👤</text>
  <text x="804" y="295" text-anchor="middle" font-size="11" fill="#d1d5db">1792 × 2400 px</text>
  <text x="804" y="311" text-anchor="middle" font-size="11" fill="#d1d5db">2K · JPEG</text>
  <text x="804" y="327" text-anchor="middle" font-size="11" fill="#6b7280">images/output.jpg</text>
  <text x="804" y="345" text-anchor="middle" font-size="10" fill="#6b7280">~500 KB – 3.5 MB</text>

  <!-- ══════════════════════════════
       ENV / CONFIG LEGEND (bottom)
       ══════════════════════════════ -->
  <rect x="20" y="510" width="650" height="110" rx="8" fill="#13151f" stroke="#2d3148" stroke-width="1"/>
  <text x="40" y="533" font-size="11" font-weight="bold" fill="#6b7280" letter-spacing="1">ENVIRONMENT VARIABLES</text>

  <!-- KIE -->
  <rect x="35" y="543" width="130" height="28" rx="4" fill="#0f2320" stroke="#22c55e" stroke-width="1"/>
  <text x="100" y="561" text-anchor="middle" font-size="10" fill="#22c55e">KIE_API_KEY</text>
  <text x="100" y="573" text-anchor="middle" font-size="9" fill="#6b7280">required for Kie.ai</text>

  <!-- HF -->
  <rect x="185" y="543" width="130" height="28" rx="4" fill="#1f1313" stroke="#f87171" stroke-width="1"/>
  <text x="250" y="561" text-anchor="middle" font-size="10" fill="#f87171">HF_TOKEN</text>
  <text x="250" y="573" text-anchor="middle" font-size="9" fill="#6b7280">required for HF mode</text>

  <!-- SDXL free -->
  <rect x="335" y="543" width="150" height="28" rx="4" fill="#131324" stroke="#818cf8" stroke-width="1"/>
  <text x="410" y="561" text-anchor="middle" font-size="10" fill="#818cf8">No key needed</text>
  <text x="410" y="573" text-anchor="middle" font-size="9" fill="#6b7280">Puter.ai + local</text>

  <!-- .env note -->
  <text x="40" y="600" font-size="10" fill="#6b7280">Store keys in </text>
  <text x="111" y="600" font-size="10" fill="#f59e0b">.env</text>
  <text x="127" y="600" font-size="10" fill="#6b7280"> file at project root · Never commit to git</text>

  <!-- Prompt note -->
  <text x="40" y="614" font-size="10" fill="#6b7280">Prompts live in </text>
  <text x="122" y="614" font-size="10" fill="#4f6ef7">prompts/*.json</text>
  <text x="202" y="614" font-size="10" fill="#6b7280"> · Reference images in </text>
  <text x="330" y="614" font-size="10" fill="#f59e0b">images/</text>
  <text x="370" y="614" font-size="10" fill="#6b7280"> · Output saved to </text>
  <text x="466" y="614" font-size="10" fill="#f59e0b">images/</text>

  <!-- ══════════════════════════════
       ARROWHEAD MARKERS
       ══════════════════════════════ -->
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f6ef7"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>

</svg>
