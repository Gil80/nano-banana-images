<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160"
     font-family="'Segoe UI', system-ui, Arial, sans-serif">

  <defs>
    <marker id="a-blue"   markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#4f6ef7"/></marker>
    <marker id="a-amber"  markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#f59e0b"/></marker>
    <marker id="a-green"  markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#22c55e"/></marker>
    <marker id="a-cyan"   markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#06b6d4"/></marker>
    <marker id="a-indigo" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#818cf8"/></marker>
    <marker id="a-violet" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#a78bfa"/></marker>
    <marker id="a-red"    markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#f87171"/></marker>
    <marker id="a-white"  markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L0,12 L12,6 z" fill="#94a3b8"/></marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="img-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="3840" height="2160" fill="#0d1117"/>

  <!-- TITLE -->
  <text x="1920" y="80" text-anchor="middle" font-size="52" font-weight="700" fill="#f1f5f9">
    nano-banana-images — Architecture
  </text>
  <text x="1920" y="130" text-anchor="middle" font-size="28" fill="#64748b">
    AI Image Generation Toolkit · Prompt Creation → Backend Selection → Image Output
  </text>

  <!-- ════════════════════════════════════════════
       PHASE 1: PROMPT CREATION (left third)
       ════════════════════════════════════════════ -->

  <!-- Phase 1 header -->
  <rect x="60" y="180" width="1160" height="60" rx="12" fill="#1e293b"/>
  <text x="640" y="220" text-anchor="middle" font-size="26" font-weight="700" fill="#4f6ef7" letter-spacing="3">PHASE 1 — PROMPT CREATION</text>

  <!-- User Input -->
  <rect x="80" y="280" width="500" height="220" rx="14" fill="#0f172a" stroke="#4f6ef7" stroke-width="3" filter="url(#shadow)"/>
  <text x="330" y="320" text-anchor="middle" font-size="28" font-weight="700" fill="#4f6ef7">User Input</text>
  <line x1="100" y1="336" x2="560" y2="336" stroke="#1e3a8a" stroke-width="1"/>
  <text x="330" y="370" text-anchor="middle" font-size="22" fill="#94a3b8">Natural language description</text>
  <text x="330" y="400" text-anchor="middle" font-size="20" fill="#64748b">"Create a candid photo of a</text>
  <text x="330" y="428" text-anchor="middle" font-size="20" fill="#64748b">woman jumping with joy..."</text>
  <text x="330" y="468" text-anchor="middle" font-size="20" font-weight="600" fill="#f59e0b">+ resolution: 1K / 2K / 4K</text>

  <!-- Master Prompt Reference -->
  <rect x="80" y="540" width="500" height="160" rx="14" fill="#0f172a" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
  <text x="330" y="580" text-anchor="middle" font-size="24" font-weight="700" fill="#f59e0b">Master Prompt Reference</text>
  <line x1="100" y1="596" x2="560" y2="596" stroke="#78350f" stroke-width="1"/>
  <text x="330" y="628" text-anchor="middle" font-size="20" fill="#94a3b8">Camera math · Imperfections</text>
  <text x="330" y="656" text-anchor="middle" font-size="20" fill="#94a3b8">Lighting behavior · Negative stacks</text>
  <text x="330" y="684" text-anchor="middle" font-size="18" fill="#f59e0b">prompts/master_prompt_reference.md</text>

  <!-- Reference Image -->
  <rect x="80" y="740" width="500" height="140" rx="14" fill="#0f172a" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="780" text-anchor="middle" font-size="24" font-weight="700" fill="#f59e0b">Reference Image</text>
  <text x="415" y="780" font-size="18" fill="#fcd34d">(optional)</text>
  <line x1="100" y1="796" x2="560" y2="796" stroke="#78350f" stroke-width="1"/>
  <text x="330" y="828" text-anchor="middle" font-size="20" fill="#94a3b8">Identity preservation · style matching</text>
  <text x="330" y="856" text-anchor="middle" font-size="18" fill="#64748b">images/*.jpg / *.png</text>

  <!-- AI Assistant (Claude Code) -->
  <rect x="660" y="280" width="540" height="600" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
  <rect x="660" y="264" width="180" height="32" rx="8" fill="#22c55e"/>
  <text x="750" y="286" text-anchor="middle" font-size="16" font-weight="700" fill="#052e16">AI ASSISTANT</text>
  <text x="930" y="320" text-anchor="middle" font-size="26" font-weight="700" fill="#22c55e">Claude Code</text>
  <text x="930" y="352" text-anchor="middle" font-size="20" fill="#86efac">nano-banana-images skill</text>
  <line x1="680" y1="370" x2="1180" y2="370" stroke="#14532d" stroke-width="1"/>
  <text x="930" y="404" text-anchor="middle" font-size="20" fill="#94a3b8">1. Ask for resolution (1K/2K/4K)</text>
  <text x="930" y="438" text-anchor="middle" font-size="20" fill="#94a3b8">2. Ask for output path</text>
  <text x="930" y="472" text-anchor="middle" font-size="20" fill="#94a3b8">3. Consult master reference</text>
  <text x="930" y="506" text-anchor="middle" font-size="20" fill="#94a3b8">4. Construct structured prompt</text>

  <line x1="680" y1="530" x2="1180" y2="530" stroke="#14532d" stroke-width="1"/>

  <!-- Two output formats -->
  <text x="930" y="564" text-anchor="middle" font-size="22" font-weight="600" fill="#22c55e">Output Formats</text>

  <rect x="690" y="586" width="230" height="80" rx="10" fill="#052e16" stroke="#4f6ef7" stroke-width="2"/>
  <text x="805" y="618" text-anchor="middle" font-size="18" font-weight="600" fill="#4f6ef7">JSON Prompt</text>
  <text x="805" y="646" text-anchor="middle" font-size="16" fill="#94a3b8">prompts/*.json</text>

  <rect x="940" y="586" width="240" height="80" rx="10" fill="#052e16" stroke="#06b6d4" stroke-width="2"/>
  <text x="1060" y="618" text-anchor="middle" font-size="18" font-weight="600" fill="#06b6d4">Plain Text</text>
  <text x="1060" y="646" text-anchor="middle" font-size="16" fill="#94a3b8">for Gemini web UI</text>

  <text x="805" y="710" text-anchor="middle" font-size="18" fill="#64748b">→ API backends</text>
  <text x="1060" y="710" text-anchor="middle" font-size="18" fill="#64748b">→ copy/paste</text>

  <!-- Arrows: Input → AI Assistant -->
  <line x1="580" y1="390" x2="650" y2="390" stroke="#4f6ef7" stroke-width="3" marker-end="url(#a-blue)"/>
  <line x1="580" y1="620" x2="650" y2="560" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#a-amber)"/>
  <line x1="580" y1="810" x2="650" y2="700" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#a-amber)"/>

  <!-- ════════════════════════════════════════════
       PHASE 2: SCRIPTS + BACKENDS (middle)
       ════════════════════════════════════════════ -->

  <!-- Phase 2 header -->
  <rect x="1280" y="180" width="1160" height="60" rx="12" fill="#1e293b"/>
  <text x="1860" y="220" text-anchor="middle" font-size="26" font-weight="700" fill="#22c55e" letter-spacing="3">PHASE 2 — GENERATION</text>

  <!-- generate_kie.py → Kie.ai -->
  <rect x="1300" y="280" width="520" height="130" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
  <rect x="1300" y="264" width="160" height="32" rx="8" fill="#22c55e"/>
  <text x="1380" y="286" text-anchor="middle" font-size="16" font-weight="700" fill="#052e16">RECOMMENDED</text>
  <text x="1560" y="320" text-anchor="middle" font-size="26" font-weight="700" fill="#22c55e">generate_kie.py</text>
  <line x1="1320" y1="340" x2="1800" y2="340" stroke="#14532d" stroke-width="1"/>
  <text x="1560" y="370" text-anchor="middle" font-size="20" fill="#94a3b8">Kie.ai nano-banana-2 · KIE_API_KEY</text>
  <text x="1560" y="398" text-anchor="middle" font-size="18" fill="#64748b">Upload ref → task → poll → download</text>

  <!-- generate_gemini.py → Gemini API -->
  <rect x="1300" y="440" width="520" height="130" rx="14" fill="#083344" stroke="#06b6d4" stroke-width="3" filter="url(#shadow)"/>
  <text x="1560" y="480" text-anchor="middle" font-size="26" font-weight="700" fill="#06b6d4">generate_gemini.py</text>
  <line x1="1320" y1="500" x2="1800" y2="500" stroke="#164e63" stroke-width="1"/>
  <text x="1560" y="530" text-anchor="middle" font-size="20" fill="#94a3b8">Google Gemini API · GEMINI_API_KEY</text>
  <text x="1560" y="558" text-anchor="middle" font-size="18" fill="#64748b">Direct call · gemini-2.5-flash-image</text>

  <!-- generate_sdxl.py → Puter.ai -->
  <rect x="1300" y="600" width="520" height="110" rx="14" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="1560" y="638" text-anchor="middle" font-size="24" font-weight="700" fill="#818cf8">generate_sdxl.py</text>
  <line x1="1320" y1="656" x2="1800" y2="656" stroke="#312e81" stroke-width="1"/>
  <text x="1560" y="684" text-anchor="middle" font-size="20" fill="#94a3b8">Free cloud SDXL · Puter.ai · no API key</text>

  <!-- generate_local.py → Local -->
  <rect x="1300" y="740" width="520" height="110" rx="14" fill="#1a0a2e" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="1560" y="778" text-anchor="middle" font-size="24" font-weight="700" fill="#a78bfa">generate_local.py</text>
  <line x1="1320" y1="796" x2="1800" y2="796" stroke="#2e1065" stroke-width="1"/>
  <text x="1560" y="824" text-anchor="middle" font-size="20" fill="#94a3b8">Local SDXL · diffusers · GPU/CPU</text>

  <!-- generate_hf.py → HuggingFace -->
  <rect x="1300" y="880" width="520" height="110" rx="14" fill="#2d0a0a" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="1560" y="918" text-anchor="middle" font-size="24" font-weight="700" fill="#f87171">generate_hf.py</text>
  <line x1="1320" y1="936" x2="1800" y2="936" stroke="#7f1d1d" stroke-width="1"/>
  <text x="1560" y="964" text-anchor="middle" font-size="20" fill="#f87171">HF Spaces · HF_TOKEN · billing required</text>

  <!-- export_prompt.py → Gemini web UI -->
  <rect x="1300" y="1020" width="520" height="110" rx="14" fill="#083344" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="1560" y="1058" text-anchor="middle" font-size="24" font-weight="700" fill="#06b6d4">export_prompt.py</text>
  <line x1="1320" y1="1076" x2="1800" y2="1076" stroke="#164e63" stroke-width="1"/>
  <text x="1560" y="1104" text-anchor="middle" font-size="20" fill="#94a3b8">JSON → plain text · for Gemini web UI</text>

  <!-- Arrows: Phase 1 → Phase 2 -->
  <line x1="1200" y1="626" x2="1288" y2="345" stroke="#22c55e" stroke-width="3" marker-end="url(#a-green)"/>
  <line x1="1200" y1="626" x2="1288" y2="505" stroke="#06b6d4" stroke-width="3" marker-end="url(#a-cyan)"/>
  <line x1="1200" y1="626" x2="1288" y2="655" stroke="#818cf8" stroke-width="2" marker-end="url(#a-indigo)"/>
  <line x1="1200" y1="626" x2="1288" y2="795" stroke="#a78bfa" stroke-width="2" marker-end="url(#a-violet)"/>
  <line x1="1200" y1="626" x2="1288" y2="935" stroke="#f87171" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#a-red)"/>
  <line x1="1200" y1="650" x2="1288" y2="1075" stroke="#06b6d4" stroke-width="2" marker-end="url(#a-cyan)"/>

  <!-- ════════════════════════════════════════════
       OUTPUT COLUMN (right)
       ════════════════════════════════════════════ -->

  <!-- Phase output header -->
  <rect x="2520" y="180" width="1260" height="60" rx="12" fill="#1e293b"/>
  <text x="3150" y="220" text-anchor="middle" font-size="26" font-weight="700" fill="#f59e0b" letter-spacing="3">OUTPUT</text>

  <!-- Generated Image -->
  <rect x="2540" y="280" width="560" height="840" rx="14" fill="#0f172a" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
  <text x="2820" y="320" text-anchor="middle" font-size="28" font-weight="700" fill="#f59e0b">Generated Image</text>
  <line x1="2560" y1="340" x2="3080" y2="340" stroke="#78350f" stroke-width="1"/>

  <!-- Image placeholder -->
  <rect x="2580" y="360" width="480" height="320" rx="8" fill="url(#img-grad)" stroke="#334155" stroke-width="2"/>
  <circle cx="2820" cy="460" r="60" fill="#1e3a5f" stroke="#2d4a7a" stroke-width="2"/>
  <path d="M2700,680 Q2730,570 2820,570 Q2910,570 2940,680 Z" fill="#1e3a5f" stroke="#2d4a7a" stroke-width="2"/>
  <text x="2820" y="650" text-anchor="middle" font-size="18" fill="#475569">GENERATED OUTPUT</text>

  <text x="2820" y="720" text-anchor="middle" font-size="22" font-weight="600" fill="#22c55e">Kie.ai / Gemini output</text>
  <text x="2820" y="752" text-anchor="middle" font-size="20" fill="#94a3b8">Up to 3840 × 2560 px · 4K · JPG/PNG</text>
  <text x="2820" y="780" text-anchor="middle" font-size="18" fill="#64748b">Identity-preserving · reference images</text>

  <line x1="2580" y1="800" x2="3080" y2="800" stroke="#1e293b" stroke-width="1"/>

  <text x="2820" y="830" text-anchor="middle" font-size="22" font-weight="600" fill="#818cf8">Free backend output</text>
  <text x="2820" y="860" text-anchor="middle" font-size="20" fill="#94a3b8">1024 × 1024 px · JPG</text>

  <line x1="2580" y1="886" x2="3080" y2="886" stroke="#1e293b" stroke-width="1"/>

  <text x="2820" y="920" text-anchor="middle" font-size="20" fill="#94a3b8">Saved to images/output.jpg</text>
  <text x="2820" y="952" text-anchor="middle" font-size="20" fill="#94a3b8">Version naming for refinement:</text>
  <text x="2820" y="984" text-anchor="middle" font-size="22" font-weight="600" fill="#f59e0b">v1 → v1b → v1c → v2</text>
  <text x="2820" y="1016" text-anchor="middle" font-size="18" fill="#64748b">iterate prompt, rerun, compare</text>

  <!-- Gemini Web UI output -->
  <rect x="3140" y="280" width="640" height="300" rx="14" fill="#0f172a" stroke="#06b6d4" stroke-width="3" filter="url(#shadow)"/>
  <text x="3460" y="320" text-anchor="middle" font-size="28" font-weight="700" fill="#06b6d4">Gemini Web UI</text>
  <line x1="3160" y1="340" x2="3760" y2="340" stroke="#164e63" stroke-width="1"/>
  <text x="3460" y="376" text-anchor="middle" font-size="20" fill="#94a3b8">Manual copy/paste workflow</text>
  <text x="3460" y="410" text-anchor="middle" font-size="20" fill="#94a3b8">1. Paste plain text prompt</text>
  <text x="3460" y="440" text-anchor="middle" font-size="20" fill="#94a3b8">2. Upload reference images</text>
  <text x="3460" y="470" text-anchor="middle" font-size="20" fill="#94a3b8">3. Download generated image</text>
  <text x="3460" y="506" text-anchor="middle" font-size="22" font-weight="600" fill="#06b6d4">Free · No API key needed</text>
  <text x="3460" y="540" text-anchor="middle" font-size="18" fill="#64748b">gemini.google.com</text>

  <!-- Arrows: Scripts → Output -->
  <line x1="1820" y1="345" x2="2528" y2="500" stroke="#22c55e" stroke-width="3" marker-end="url(#a-green)"/>
  <line x1="1820" y1="505" x2="2528" y2="550" stroke="#06b6d4" stroke-width="3" marker-end="url(#a-cyan)"/>
  <line x1="1820" y1="655" x2="2528" y2="650" stroke="#818cf8" stroke-width="2" marker-end="url(#a-indigo)"/>
  <line x1="1820" y1="795" x2="2528" y2="700" stroke="#a78bfa" stroke-width="2" marker-end="url(#a-violet)"/>
  <line x1="1820" y1="935" x2="2528" y2="750" stroke="#f87171" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#a-red)"/>
  <line x1="1820" y1="1075" x2="3128" y2="450" stroke="#06b6d4" stroke-width="2" marker-end="url(#a-cyan)"/>

  <!-- ════════════════════════════════════════════
       ENVIRONMENT VARIABLES LEGEND
       ════════════════════════════════════════════ -->
  <rect x="60" y="1160" width="3720" height="320" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <text x="100" y="1200" font-size="22" font-weight="700" fill="#475569" letter-spacing="3">ENVIRONMENT VARIABLES &amp; CONFIGURATION</text>

  <rect x="100" y="1220" width="400" height="100" rx="10" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="1256" text-anchor="middle" font-size="22" font-weight="700" fill="#22c55e">KIE_API_KEY</text>
  <text x="300" y="1284" text-anchor="middle" font-size="18" fill="#86efac">Required for Kie.ai</text>
  <text x="300" y="1308" text-anchor="middle" font-size="16" fill="#64748b">kie.ai → account → API keys</text>

  <rect x="540" y="1220" width="400" height="100" rx="10" fill="#083344" stroke="#06b6d4" stroke-width="2"/>
  <text x="740" y="1256" text-anchor="middle" font-size="22" font-weight="700" fill="#06b6d4">GEMINI_API_KEY</text>
  <text x="740" y="1284" text-anchor="middle" font-size="18" fill="#67e8f9">Required for Gemini API</text>
  <text x="740" y="1308" text-anchor="middle" font-size="16" fill="#64748b">aistudio.google.com → API keys</text>

  <rect x="980" y="1220" width="400" height="100" rx="10" fill="#2d0a0a" stroke="#f87171" stroke-width="2"/>
  <text x="1180" y="1256" text-anchor="middle" font-size="22" font-weight="700" fill="#f87171">HF_TOKEN</text>
  <text x="1180" y="1284" text-anchor="middle" font-size="18" fill="#fca5a5">Required for HF mode</text>
  <text x="1180" y="1308" text-anchor="middle" font-size="16" fill="#64748b">huggingface.co → settings → tokens</text>

  <rect x="1420" y="1220" width="400" height="100" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="1620" y="1256" text-anchor="middle" font-size="22" font-weight="700" fill="#818cf8">No key needed</text>
  <text x="1620" y="1284" text-anchor="middle" font-size="18" fill="#c7d2fe">Puter.ai + Local + Gemini web UI</text>
  <text x="1620" y="1308" text-anchor="middle" font-size="16" fill="#64748b">generate_sdxl.py · generate_local.py</text>

  <text x="1920" y="1260" font-size="20" fill="#94a3b8">Store keys in</text>
  <text x="2054" y="1260" font-size="20" fill="#f59e0b" font-weight="600">.env</text>
  <text x="2096" y="1260" font-size="20" fill="#94a3b8">at project root — never commit</text>
  <text x="1920" y="1292" font-size="20" fill="#94a3b8">Prompts in</text>
  <text x="2020" y="1292" font-size="20" fill="#4f6ef7" font-weight="600">prompts/*.json</text>
  <text x="2164" y="1292" font-size="20" fill="#94a3b8">· Output in</text>
  <text x="2270" y="1292" font-size="20" fill="#f59e0b" font-weight="600">images/</text>
  <text x="1920" y="1324" font-size="20" fill="#94a3b8">Run:</text>
  <text x="1966" y="1324" font-size="20" fill="#e2e8f0" font-weight="600">python scripts/generate_kie.py prompts/my_prompt.json images/output.jpg</text>
  <text x="1920" y="1356" font-size="20" fill="#94a3b8">Master reference consulted before every prompt →</text>
  <text x="2430" y="1356" font-size="20" fill="#f59e0b" font-weight="600">prompts/master_prompt_reference.md</text>

  <!-- Dashed arrow legend -->
  <text x="1920" y="1420" font-size="18" fill="#64748b">━━━  solid arrow = active backend</text>
  <text x="2280" y="1420" font-size="18" fill="#64748b">╍╍╍  dashed arrow = limited availability</text>

</svg>
